# =============================================
# StudyHub 监控配置
# 使用 Prometheus + Grafana 监控系统指标
# =============================================
# 使用方式:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
# =============================================

version: '3.8'

services:
  # ---------------------------------------------
  # Prometheus - 指标收集
  # ---------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: studyhub-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - studyhub-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------
  # Node Exporter - 主机指标
  # ---------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: studyhub-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - studyhub-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------
  # cAdvisor - 容器指标
  # ---------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: studyhub-cadvisor
    restart: always
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    ports:
      - "8081:8080"
    networks:
      - studyhub-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------
  # Redis Exporter - Redis 指标
  # ---------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: studyhub-redis-exporter
    restart: always
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    ports:
      - "9121:9121"
    networks:
      - studyhub-network
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------
  # Postgres Exporter - PostgreSQL 指标
  # ---------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: studyhub-postgres-exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/studyhub?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - studyhub-network
    depends_on:
      - postgres
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------
  # Alertmanager - 告警管理
  # ---------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: studyhub-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - studyhub-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

# ---------------------------------------------
# 卷定义
# ---------------------------------------------
volumes:
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
