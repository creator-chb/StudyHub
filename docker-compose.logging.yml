# =============================================
# StudyHub 日志收集配置
# 使用 Loki + Grafana 收集和分析日志
# =============================================
# 使用方式:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.logging.yml up -d
# =============================================

version: '3.8'

services:
  # ---------------------------------------------
  # Loki - 日志聚合系统
  # ---------------------------------------------
  loki:
    image: grafana/loki:2.9.0
    container_name: studyhub-loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - studyhub-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------
  # Promtail - 日志收集代理
  # ---------------------------------------------
  promtail:
    image: grafana/promtail:2.9.0
    container_name: studyhub-promtail
    restart: always
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - nginx_logs:/var/log/nginx:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - studyhub-network
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------
  # Grafana - 可视化面板
  # ---------------------------------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: studyhub-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - studyhub-network
    depends_on:
      - loki
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

# ---------------------------------------------
# 卷定义
# ---------------------------------------------
volumes:
  loki_data:
    driver: local
  grafana_data:
    driver: local
