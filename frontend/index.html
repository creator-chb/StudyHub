<!DOCTYPE html>
<!--
================================================================================
  StudyHub Frontend 开发版本入口
================================================================================
  用途说明:
  - 此文件为前端独立开发/测试版本入口
  - 用于纯前端开发环境，不依赖后端服务
  - 适合快速原型开发和UI调试
  
  与主入口区别:
  - 主入口 (根目录/index.html): 包含完整认证系统和后端API集成
  - 此入口 (frontend/index.html): 前端独立运行版本，使用本地存储
  
  生产环境建议:
  - 请使用根目录的 index.html 作为主应用入口
================================================================================
-->
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub - 前端开发版本</title>
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>
    <div class="container">
        <!-- 应用头部 -->
        <header class="app-header">
            <h1 class="app-title">📚 StudyHub <small style="font-size: 0.5em; color: #888;">(Dev)</small></h1>
            <div class="app-actions">
                <button id="themeToggle" class="icon-btn" title="切换主题 (Ctrl+D)">🌙</button>
            </div>
        </header>

        <!-- 链接池模块 -->
        <div class="card">
            <div class="card-header">
                <h2>🔗 快速链接池</h2>
                <div class="card-actions">
                    <div class="filter-group">
                        <div class="search-box">
                            <input type="text" id="linkSearch" placeholder="搜索链接... (/)" autocomplete="off">
                        </div>
                        <select id="categoryFilter">
                            <option value="">全部分类</option>
                        </select>
                    </div>
                    <button id="btnAddLink" title="新建链接 (N)">+ 添加链接</button>
                </div>
            </div>
            <div id="linkList" class="link-grid">
                <div class="empty-hint">暂无链接，点击「添加链接」开始添加</div>
            </div>
        </div>

        <!-- 任务管理模块 -->
        <div class="card">
            <div class="card-header">
                <h2>📋 任务管理</h2>
                <div class="card-actions">
                    <div class="filter-group">
                        <div class="search-box">
                            <input type="text" id="taskSearch" placeholder="搜索任务..." autocomplete="off">
                        </div>
                        <select id="priorityFilter">
                            <option value="all">全部优先级</option>
                            <option value="high">🔴 高</option>
                            <option value="medium">🟡 中</option>
                            <option value="low">🟢 低</option>
                        </select>
                        <select id="statusFilter">
                            <option value="all">全部状态</option>
                            <option value="pending">进行中</option>
                            <option value="completed">已完成</option>
                        </select>
                    </div>
                    <button id="btnAddTask" title="创建任务 (T)">+ 创建任务</button>
                </div>
            </div>
            <div id="taskList" class="task-grid">
                <div class="empty-hint">暂无任务，点击「创建任务」开始添加</div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- 脚本加载（顺序重要） -->
    <script src="src/js/modules/config.js"></script>
    <script src="src/js/modules/utils.js"></script>
    <script src="src/js/modules/errorHandler.js"></script>
    <!-- 存储抽象层（Phase 0 新增） -->
    <script src="src/js/modules/storage/AbstractStorage.js"></script>
    <script src="src/js/modules/storage/LocalStorageAdapter.js"></script>
    <script src="src/js/modules/storage/ApiStorageAdapter.js"></script>
    <script src="src/js/modules/storage.js"></script>
    <!-- API 客户端（Phase 1 新增） -->
    <script src="src/js/modules/api.js?v=2"></script>
    <script src="src/js/modules/auth.js?v=2"></script>
    <!-- 同步设置（Phase 2 新增） -->
    <script src="src/js/modules/syncSettings.js"></script>
    <!-- UI 模块 -->
    <script src="src/js/modules/toast.js"></script>
    <script src="src/js/modules/modal.js"></script>
    <script src="src/js/modules/theme.js"></script>
    <script src="src/js/modules/keyboard.js"></script>
    <script src="src/js/modules/touch.js"></script>
    <!-- 业务模块 -->
    <script src="src/js/modules/linkManager.js"></script>
    <script src="src/js/modules/taskManager.js"></script>
    <script src="src/js/modules/renderer.js"></script>
    <script src="src/js/app.js"></script>

    <!-- 绑定按钮事件 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 添加链接按钮
            document.getElementById('btnAddLink').addEventListener('click', () => {
                App.openLinkModal();
            });

            // 添加任务按钮
            document.getElementById('btnAddTask').addEventListener('click', () => {
                App.openTaskModal();
            });

            // 分类筛选
            document.getElementById('categoryFilter').addEventListener('change', () => {
                // 触发重新渲染
                LinkManager.subscribe(() => {})();
            });

            // 优先级筛选
            document.getElementById('priorityFilter').addEventListener('change', () => {
                // 触发重新渲染
                TaskManager.subscribe(() => {})();
            });

            // 状态筛选
            document.getElementById('statusFilter').addEventListener('change', () => {
                // 触发重新渲染
                TaskManager.subscribe(() => {})();
            });

            // 渲染分类选项
            const categorySelect = document.getElementById('categoryFilter');
            const categories = LinkManager.getCategories();
            categorySelect.innerHTML = '<option value="">全部分类</option>' +
                categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        });
    </script>
</body>
</html>
