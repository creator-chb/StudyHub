<!DOCTYPE html>
<!--
================================================================================
  StudyHub 主应用入口文件
================================================================================
  文件位置: /index.html (项目根目录)
  
  功能说明:
  - 项目主应用入口，包含完整的模块化架构
  - 集成用户认证系统（登录/注册）
  - 支持数据导入导出功能
  - 前后端分离架构，可连接后端API服务
  
  其他入口文件:
  - /frontend/index.html: 前端独立开发版本（无认证系统）
  - /legacy/studyhub_v1_legacy.html: v1.0历史遗留单体应用版本
  
  使用建议:
  - 生产环境请使用此文件作为主入口
  - 开发前端UI时可使用 /frontend/index.html
================================================================================
-->
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub - 学习管理 Dashboard</title>
    <link rel="stylesheet" href="frontend/src/css/main.css">
</head>
<body>
    <div class="container">
        <!-- 应用头部 -->
        <header class="app-header">
            <h1 class="app-title">📚 StudyHub</h1>
            <div class="app-actions">
                <button id="btnExport" class="btn-secondary" title="导出数据 (Ctrl+E)">📥 导出</button>
                <button id="btnImport" class="btn-secondary" title="导入数据 (Ctrl+I)">📤 导入</button>
                <button id="themeToggle" class="icon-btn" title="切换主题 (Ctrl+D)">🌙</button>
            </div>
        </header>

        <!-- 链接池模块 -->
        <div class="card">
            <div class="card-header">
                <h2>🔗 快速链接池</h2>
                <div class="card-actions">
                    <div class="filter-group">
                        <div class="search-box">
                            <input type="text" id="linkSearch" placeholder="搜索链接... (/)" autocomplete="off">
                        </div>
                        <select id="categoryFilter">
                            <option value="">全部分类</option>
                        </select>
                    </div>
                    <button id="btnAddLink" title="新建链接 (N)">+ 添加链接</button>
                </div>
            </div>
            <div id="linkList" class="link-grid">
                <div class="empty-hint">暂无链接，点击「添加链接」开始添加</div>
            </div>
        </div>

        <!-- 任务管理模块 -->
        <div class="card">
            <div class="card-header">
                <h2>📋 任务管理</h2>
                <div class="card-actions">
                    <div class="filter-group">
                        <div class="search-box">
                            <input type="text" id="taskSearch" placeholder="搜索任务..." autocomplete="off">
                        </div>
                        <select id="priorityFilter">
                            <option value="all">全部优先级</option>
                            <option value="high">🔴 高</option>
                            <option value="medium">🟡 中</option>
                            <option value="low">🟢 低</option>
                        </select>
                        <select id="statusFilter">
                            <option value="all">全部状态</option>
                            <option value="pending">进行中</option>
                            <option value="completed">已完成</option>
                        </select>
                    </div>
                    <button id="btnAddTask" title="创建任务 (T)">+ 创建任务</button>
                </div>
            </div>
            <div id="taskList" class="task-grid">
                <div class="empty-hint">暂无任务，点击「创建任务」开始添加</div>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="importFile" class="hidden" accept=".json">

    <!-- Toast 容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- 脚本加载（顺序重要） -->
    <script src="frontend/src/js/modules/config.js?v=4"></script>
    <script src="frontend/src/js/modules/utils.js?v=4"></script>
    <script src="frontend/src/js/modules/errorHandler.js?v=4"></script>
    <!-- 加载状态模块 -->
    <script src="frontend/src/js/modules/loading.js?v=4"></script>
    <!-- 存储抽象层（Phase 0 新增） -->
    <script src="frontend/src/js/modules/storage/AbstractStorage.js?v=4"></script>
    <script src="frontend/src/js/modules/storage/LocalStorageAdapter.js?v=4"></script>
    <script src="frontend/src/js/modules/storage/ApiStorageAdapter.js?v=4"></script>
    <script src="frontend/src/js/modules/storage.js?v=4"></script>
    <!-- API 客户端（Phase 1 新增） -->
    <script src="frontend/src/js/modules/api.js?v=4"></script>
    <script src="frontend/src/js/modules/auth.js?v=4"></script>
    <!-- 同步设置（Phase 2 新增） -->
    <script src="frontend/src/js/modules/syncSettings.js?v=4"></script>
    <!-- UI 模块 -->
    <script src="frontend/src/js/modules/toast.js?v=4"></script>
    <script src="frontend/src/js/modules/modal.js?v=4"></script>
    <script src="frontend/src/js/modules/theme.js?v=4"></script>
    <script src="frontend/src/js/modules/keyboard.js?v=4"></script>
    <script src="frontend/src/js/modules/touch.js?v=4"></script>
    <!-- 业务模块 -->
    <script src="frontend/src/js/modules/linkManager.js?v=4"></script>
    <script src="frontend/src/js/modules/taskManager.js?v=4"></script>
    <script src="frontend/src/js/modules/renderer.js?v=4"></script>
    <!-- 撤销管理模块 -->
    <script src="frontend/src/js/modules/undoManager.js?v=4"></script>
    <!-- 懒加载模块 -->
    <script src="frontend/src/js/modules/lazyLoader.js?v=4"></script>
    <script src="frontend/src/js/app.js?v=4"></script>

    <!-- 绑定按钮事件 -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 初始化存储模块（必须在其他模块之前）
            await Storage.init();

            // 初始化认证模块
            Auth.init();

            // 登录/注册按钮
            const headerActions = document.querySelector('.app-actions');
            const loginBtn = document.createElement('button');
            loginBtn.id = 'btnLogin';
            loginBtn.className = 'btn-secondary';
            loginBtn.textContent = '登录';
            loginBtn.addEventListener('click', () => Auth.openLogin());
            headerActions.appendChild(loginBtn);

            const registerBtn = document.createElement('button');
            registerBtn.id = 'btnRegister';
            registerBtn.className = 'btn-secondary';
            registerBtn.textContent = '注册';
            registerBtn.addEventListener('click', () => Auth.openRegister());
            headerActions.appendChild(registerBtn);

            // 同步设置按钮（先创建，后面会用到）
            const syncBtn = document.createElement('button');
            syncBtn.id = 'btnSyncSettings';
            syncBtn.className = 'icon-btn';
            syncBtn.title = '同步设置';
            syncBtn.innerHTML = SyncSettings.getStatusIndicatorHTML();
            syncBtn.addEventListener('click', () => SyncSettings.openModal());
            headerActions.insertBefore(syncBtn, headerActions.firstChild);

            // 监听存储模式变化更新指示器
            Storage.onModeChange((newMode) => {
                syncBtn.innerHTML = SyncSettings.getStatusIndicatorHTML();
            });

            // 监听认证状态变化
            Auth.subscribe((event, data) => {
                if (event === 'login' || event === 'register') {
                    // 隐藏登录/注册按钮
                    loginBtn.style.display = 'none';
                    registerBtn.style.display = 'none';
                    // 显示同步设置按钮
                    syncBtn.style.display = '';
                    
                    // 登录成功后自动切换到云端模式并同步数据
                    Storage.switchMode('api').then(result => {
                        if (result.success) {
                            Toast.show('已切换到云端同步模式', 'success');
                            // 重新加载数据并渲染
                            LinkManager.reload();
                            TaskManager.reload();
                            App.renderLinks();
                            App.renderTasks();
                        } else {
                            console.warn('[App] 切换云端模式失败:', result.message);
                        }
                    });
                } else if (event === 'logout') {
                    // 显示登录/注册按钮
                    loginBtn.style.display = '';
                    registerBtn.style.display = '';
                    // 隐藏同步设置按钮
                    syncBtn.style.display = 'none';
                    
                    // 登出后切换回本地模式
                    Storage.switchMode('local').then(() => {
                        LinkManager.reload();
                        TaskManager.reload();
                        App.renderLinks();
                        App.renderTasks();
                    });
                }
            });

            // 根据认证状态显示/隐藏按钮
            if (Auth.isAuthenticated()) {
                loginBtn.style.display = 'none';
                registerBtn.style.display = 'none';
                syncBtn.style.display = '';

                // Storage.init() 已经自动处理 API 模式的初始化和同步
                // 现在只需要重新加载并渲染数据
                if (Storage.getMode() === 'api') {
                    LinkManager.reload();
                    TaskManager.reload();
                    App.renderLinks();
                    App.renderTasks();
                    console.log('[App] API 模式已初始化，数据已加载并渲染');
                }
            } else {
                syncBtn.style.display = 'none';
            }

            // 添加链接按钮
            document.getElementById('btnAddLink').addEventListener('click', () => {
                App.openLinkModal();
            });

            // 添加任务按钮
            document.getElementById('btnAddTask').addEventListener('click', () => {
                App.openTaskModal();
            });

            // 导出按钮
            document.getElementById('btnExport').addEventListener('click', () => {
                App.exportData();
            });

            // 导入按钮
            document.getElementById('btnImport').addEventListener('click', () => {
                App.importData();
            });

            // 分类筛选
            document.getElementById('categoryFilter').addEventListener('change', () => {
                // 触发重新渲染
                LinkManager.subscribe(() => {})();
            });

            // 优先级筛选
            document.getElementById('priorityFilter').addEventListener('change', () => {
                // 触发重新渲染
                TaskManager.subscribe(() => {})();
            });

            // 状态筛选
            document.getElementById('statusFilter').addEventListener('change', () => {
                // 触发重新渲染
                TaskManager.subscribe(() => {})();
            });

            // 渲染分类选项
            const categorySelect = document.getElementById('categoryFilter');
            const categories = LinkManager.getCategories();
            categorySelect.innerHTML = '<option value="">全部分类</option>' +
                categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        });
    </script>
</body>
</html>
